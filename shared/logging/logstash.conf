# Logstash Configuration for Ecommerce Platform
# Collects, processes, and forwards logs to Elasticsearch

input {
  tcp {
    port => 5044
    codec => json
  }
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Parse timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }

  # Add service name from log
  if [service] {
    mutate {
      add_field => {
        "[@metadata][service_name]" => "%{service}"
      }
    }
  }

  # Add trace ID for correlation
  if [traceId] {
    mutate {
      add_field => {
        "[@metadata][trace_id]" => "%{traceId}"
      }
    }
  }

  # Extract log level
  if [level] {
    mutate {
      add_field => {
        "[@metadata][log_level]" => "%{level}"
      }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "agent", "ecs", "@version" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}
