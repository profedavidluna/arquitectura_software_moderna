_format_version: "2.1"
_transform: true

services:
  - name: user-service
    url: http://user-service:8082
    routes:
      - name: user-service-route
        paths:
          - /api/v1/users
        strip_path: true
    plugins:
      - name: keycloak-oidc
        config:
          issuer: http://keycloak:8180/realms/ecommerce
          client_id: web-client
          client_secret: ${service-account-secret}
          credentials:
            - Authorization
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:8080
            - http://localhost:8100
            - http://localhost:4200
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
            - X-RateLimit-Limit
            - X-RateLimit-Remaining
          credentials: true
          max_age: 3600

