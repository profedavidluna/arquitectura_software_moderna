    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ecommerce-network

# ============================================================
# VOLUMES & NETWORKS
# ============================================================

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
