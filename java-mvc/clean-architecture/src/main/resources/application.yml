spring:
  application:
    name: clean-architecture-ecommerce
  datasource:
    url: jdbc:h2:mem:cleandb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8083
